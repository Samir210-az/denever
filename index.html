<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Denver II Profesional İnkişaf Testi – Keçirilmiş testlər</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e8f0ec 0%, #dbe9e2 100%);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 1.5rem;
            color: #1a3a2f;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0e5c49, #1d8f72);
            padding: 2rem 2rem 1.8rem;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .header::after {
            content: "🧸";
            position: absolute;
            bottom: -20px;
            right: 20px;
            font-size: 100px;
            opacity: 0.08;
            pointer-events: none;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
        }
        .badge {
            background: rgba(255,255,210,0.2);
            padding: 0.25rem 1rem;
            border-radius: 60px;
            font-size: 0.75rem;
        }
        .subhead {
            margin-top: 0.5rem;
            opacity: 0.85;
            font-size: 0.9rem;
        }
        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin: 0.8rem 2rem 0 2rem;
        }
        .archive-btn {
            background: rgba(255,255,245,0.9);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            color: #1a6e5a;
            font-family: 'Inter', sans-serif;
        }
        .archive-btn i { margin-right: 6px; }
        .archive-btn:hover { background: white; transform: translateY(-2px); box-shadow: 0 5px 12px rgba(0,0,0,0.1); }
        .info-panel {
            background: #f6fef9;
            margin: 0.5rem 2rem 0.5rem 2rem;
            padding: 1rem 1.8rem;
            border-radius: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            border: 1px solid #cee6dd;
        }
        .info-field { flex: 1; min-width: 140px; }
        .info-field label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #1a6e5a; }
        .info-field input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            border: 1.5px solid #dcf0e9;
            background: white;
            font-family: 'Inter', monospace;
        }
        .domain-card {
            margin: 1.5rem 2rem;
            border-radius: 28px;
            background: white;
            border: 1px solid #e2f0ea;
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        .domain-card:hover { box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15); transform: translateY(-2px); }
        .domain-title {
            background: #f2fbf7;
            padding: 1.1rem 1.8rem;
            border-radius: 28px 28px 24px 24px;
            border-bottom: 2px solid #cce8df;
        }
        .domain-title h2 { font-size: 1.45rem; color: #165f4b; display: flex; align-items: center; gap: 8px; }
        .domain-desc { font-size: 0.7rem; color: #498573; margin-top: 4px; }
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 1rem;
            padding: 1.4rem;
        }
        .test-item {
            background: #ffffff;
            border: 1px solid #e3f0ea;
            border-radius: 24px;
            padding: 0.9rem;
        }
        .item-text { font-weight: 700; font-size: 0.85rem; color: #1e493e; margin-bottom: 6px; }
        .item-norm {
            background: #eef6f2;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #146454;
            margin-bottom: 12px;
        }
        .item-options { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .item-options label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #fefefe;
            border: 1px solid #d7eae2;
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .item-options label:hover { background: #e9f4ef; }
        .item-options input { accent-color: #1e7a63; width: 14px; height: 14px; }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 0.5rem 2rem 1rem 2rem;
        }
        .btn {
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }
        .btn-primary { background: linear-gradient(105deg, #1c765f, #1b8b6f); color: white; box-shadow: 0 8px 18px -8px rgba(27,117,90,0.4); }
        .btn-primary:hover { transform: translateY(-3px); background: linear-gradient(105deg, #145e4b, #147a60);}
        .btn-secondary { background: #ecf3f0; border: 1px solid #c8dfd6; color: #2b6251; }
        .btn-secondary:hover { background: #e0ece6; transform: translateY(-2px);}
        .btn-report { background: #fdf3e0; border: 1px solid #f0dbbe; color: #956e3c; }
        .btn-report:hover { background: #f7e9d6; transform: translateY(-2px);}
        .results-panel {
            background: #f8fffc;
            margin: 0 2rem 1rem 2rem;
            border-radius: 32px;
            padding: 1.5rem;
            border-top: 5px solid #289672;
            display: none;
            animation: fadeSlideUp 0.4s ease-out;
        }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .results-panel h3 { font-size: 1.5rem; color: #175f4d; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .detail-summary {
            background: white;
            border-radius: 24px;
            padding: 1.2rem;
            max-height: 380px;
            overflow-y: auto;
            font-size: 0.8rem;
            border: 1px solid #dbefe7;
            margin-top: 1.2rem;
        }
        .status-delay { color: #d63918; font-weight: 700; }
        .status-warn { color: #e67e22; font-weight: 700; }
        /* Modal fərdi dialoq */
        .custom-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .custom-modal-content {
            background: white;
            max-width: 400px;
            width: 85%;
            border-radius: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: fadeSlideUp 0.2s;
        }
        .custom-modal-header {
            background: #f2fbf7;
            padding: 1rem 1.5rem;
            border-bottom: 2px solid #cce8df;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .custom-modal-header h3 { color: #165f4b; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .custom-modal-body { padding: 1.5rem; font-size: 0.95rem; color: #1a3a2f; }
        .custom-modal-footer { padding: 1rem 1.5rem; background: #f9fefb; display: flex; justify-content: flex-end; gap: 0.8rem; }
        .modal-btn {
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;

        .modal-btn-primary { background: #1b6e5a; color: white; }
        .modal-btn-secondary { background: #ecf3f0; color: #2b6251; }
        .close-modal-icon { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #6f9a8b; }
        footer {
            text-align: center;
            padding: 1.2rem;
            font-size: 0.8rem;
            border-top: 1px solid #deede7;
            background: #ffffff;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            color: white;
            text-decoration: none;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .social-link:hover { transform: scale(1.02); }
        .copyright { margin-top: 12px; font-size: 0.7rem; color: #6f9a8b; }
        @media (max-width: 700px) {
            body { padding: 0.8rem; }
            .questions-grid { grid-template-columns: 1fr; padding: 1rem; }
            .domain-card, .action-bar, .info-panel, .top-actions { margin-left: 1rem; margin-right: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Denver II İnkişaf Testi <span class="badge">📋 peşəkar versiya</span></h1>
        <div class="subhead"> • Xüsusi qayğıya ehtiyacı olan uşaqlar üçün fərdi qiymətləndirmə • </div>
    </div>

    <div class="top-actions">
        <button class="archive-btn" id="openArchiveBtn"><i class="fas fa-folder-open"></i> Keçirilmiş testlər</button>
    </div>

    <div class="info-panel">
        <div class="info-field"><label>👶 Uşağın adı / kodu</label><input type="text" id="childName" placeholder="Məs. Həsən"></div>
        <div class="info-field"><label>📅 Yaş (ayla)</label><input type="number" id="childAge" placeholder="28" min="0" max="78"></div>
        <div class="info-field"><label>📆 Test tarixi</label><input type="date" id="testDate"></div>
        <div class="info-field"><label>👩‍⚕️ Mütəxəssis adı</label><input type="text" id="expertName" placeholder="Psixoloq / Həkim"></div>
    </div>

    <div id="domainsStack"></div>

    <div class="action-bar">
        <button class="btn btn-primary" id="analyzeBtn">📊 Psixoloji analiz et</button>
        <button class="btn btn-secondary" id="resetBtn">⟳ Cavabları sıfırla</button>
        <button class="btn btn-report" id="reportBtn">📄 Valideyn çıxarışı (arayış)</button>
    </div>

    <div id="resultsArea" class="results-panel">
        <h3>📈 Nəticə və inkişaf profili</h3>
        <div id="resultsBrief"></div>
        <div id="extraDetails" class="detail-summary"></div>
    </div>

    <footer>
        <a href="https://www.instagram.com/s_akhundoff" target="_blank" rel="noopener noreferrer" class="social-link">
            <i class="fab fa-instagram"></i> by s_akhundoff
        </a>
        <div class="copyright">Bütün hüquqları qorunur. 2026</div>
    </footer>
</div>

<!-- Modal pəncərə (keçirilmiş testlər üçün) -->
<div id="archiveModal" class="custom-modal" style="display: none;">
    <div class="custom-modal-content" style="max-width:700px;">
        <div class="custom-modal-header">
            <h3><i class="fas fa-history"></i> Keçirilmiş testlər</h3>
            <button class="close-modal-icon" id="closeModalBtn">&times;</button>
        </div>
        <div class="custom-modal-body" id="modalTestsList">Yüklənir...</div>
        <div class="custom-modal-footer"><button class="modal-btn modal-btn-secondary" id="closeModalFooterBtn">Bağla</button></div>
    </div>
</div>

<!-- Fərdi alert modal (Diqqət) -->
<div id="customAlertModal" class="custom-modal" style="display: none;">
    <div class="custom-modal-content">
        <div class="custom-modal-header">
            <h3><i class="fas fa-exclamation-triangle"></i> Diqqət</h3>
            <button class="close-modal-icon" id="closeAlertBtn">&times;</button>
        </div>
        <div class="custom-modal-body" id="alertMessageText">Mesaj</div>
        <div class="custom-modal-footer"><button class="modal-btn modal-btn-primary" id="alertOkBtn">Başa düşdüm</button></div>
    </div>
</div>

<script>
    // ================= FƏRDİ ALERT FUNKSİYASI =================
    function customAlert(message) {
        return new Promise((resolve) => {
            const modal = document.getElementById("customAlertModal");
            const msgDiv = document.getElementById("alertMessageText");
            msgDiv.innerText = message;
            modal.style.display = "flex";
            const closeHandler = () => {
                modal.style.display = "none";
                resolve();
            };
            document.getElementById("alertOkBtn").onclick = closeHandler;
            document.getElementById("closeAlertBtn").onclick = closeHandler;
        });
    }

    // ================= DOMAINS DATA (tam eyni) =================
    const domainsData = {
        personalSocial: { title: "🧸 Şəxsi-Sosial", desc: "Özünəxidmət, emosiya, sosial qarşılıqlılıq",
            items: [
                { text: "Tanış səsə baş çevirir", normMonth: 2.5 }, { text: "Öz adına gülümsəmə ilə cavab verir", normMonth: 6 },
                { text: "Böyüklərin əl çalmasını təqlid edir", normMonth: 9 }, { text: "Sadə əmrləri başa düşür ('gəl', 'ver')", normMonth: 12 },
                { text: "Oyuncağı başqasına tərəf uzadır", normMonth: 14 }, { text: "Geyinmə zamanı qolunu qoltuğa keçirir", normMonth: 18 },
                { text: "Qaşıq tutub ağzına aparmağa cəhd edir", normMonth: 16 }, { text: "Öz duyğularını mimika/göstərir", normMonth: 24 },
                { text: "Əşyaları yerinə qoymağa kömək edir", normMonth: 28 }, { text: "Sadə sosial qaydaları tanıyır (növbə gözləmə)", normMonth: 36 },
                { text: "Öz əşyalarını başqalarınınkından ayırır", normMonth: 30 }, { text: "Əl-ələ oyun oynayır ('əl çal, əl çal')", normMonth: 22 },
                { text: "Dostlarına maraq göstərir (yanında oynama)", normMonth: 32 }, { text: "Təşəkkür, salam kimi sözləri işlədə bilir", normMonth: 34 },
                { text: "Gündəlik işlərdə müstəqillik (əllərini yuma)", normMonth: 42 }
            ] },
        fineMotor: { title: "✍️ İncə Motor", desc: "Əl-göz koordinasiyası, tutma, rəsm, tikinti",
            items: [
                { text: "Hərəkət edən üzü izləyir", normMonth: 2 }, { text: "Çınqıldağı əlində ən az 5 saniyə tutur", normMonth: 4 },
                { text: "Əşyanı bir əlindən digərinə keçirir", normMonth: 6 }, { text: "Kiçik əşyanı baş və şəhadət barmağı ilə tutur", normMonth: 10 },
                { text: "3-4 blokdan qüllə qurur", normMonth: 18 }, { text: "Qaralama xətlər çəkir", normMonth: 16 },
                { text: "Dairə şəkli çəkə bilir", normMonth: 28 }, { text: "Düymələri böyük düymələri aça bilir", normMonth: 30 },
                { text: "Qayçı ilə kağız kəsə bilir", normMonth: 36 }, { text: "4-6 hissəli puzzle yığa bilir", normMonth: 32 },
                { text: "İpə muncuq dizə bilir (böyük muncuqlar)", normMonth: 26 }, { text: "Kvadrat şəkli çəkir", normMonth: 40 },
                { text: "Əlində qələmi düzgün tutur", normMonth: 38 }, { text: "Üçbucaq çəkir", normMonth: 48 },
                { text: "Sadə labirint çəkə bilir (qələm izi)", normMonth: 44 }
            ] },
        language: { title: "🗣️ Dil & Ünsiyyət", desc: "Reseptiv, ekspressiv dil, söz ehtiyatı",
            items: [
                { text: "Səslər çıxarır (gurultu, ağulama)", normMonth: 2 }, { text: "Səsli gülüş və xoş səslər çıxarır", normMonth: 5 },
                { text: "Təkrar hecalar 'ba-ba', 'da-da'", normMonth: 8 }, { text: "Ən az 3 mənalı söz (ana, ata, su)", normMonth: 13 },
                { text: "Bədən hissələrini göstərir (burun, göz)", normMonth: 18 }, { text: "İstədiyi əşyanı adı ilə söyləyir", normMonth: 20 },
                { text: "2-3 sözlü sadə cümlə qurur", normMonth: 24 }, { text: "Sadə şəkilləri adlandıra bilir (top, pişik)", normMonth: 28 },
                { text: "Əvəzliklərdən istifadə edir (mən, sən)", normMonth: 30 }, { text: "Nə? kim? suallarını başa düşür", normMonth: 26 },
                { text: "Sadə hekayə şəklini izah edir", normMonth: 36 }, { text: "Rəngləri tanıyır (ən az 3 rəng)", normMonth: 34 },
                { text: "Əks mənaları başa düşür (böyük-kiçik)", normMonth: 38 }, { text: "Davamlı söhbət edə bilir (3-4 cümlə)", normMonth: 42 },
                { text: "Sadə tapmaca və sualları cavablandırır", normMonth: 40 }
            ] },
        grossMotor: { title: "🏃 Ümumi Motor", desc: "Tarazlıq, yerimə, qaçma, tullanma",
            items: [
                { text: "Başını qısa müddət dik tutur (üzüstü)", normMonth: 2 }, { text: "Arxadan yan üstə dönür", normMonth: 4.5 },
                { text: "Dəstəksiz oturur (10+ saniyə)", normMonth: 7 }, { text: "Qarın üstə sürünür", normMonth: 9 },
                { text: "Mebeldən tutaraq ayağa qalxır", normMonth: 11 }, { text: "Müstəqil yeriyir (4 addım)", normMonth: 14 },
                { text: "Yerindən tullanır (iki ayaqla)", normMonth: 28 }, { text: "Bir ayaq üstə 2 saniyə dayanır", normMonth: 32 },
                { text: "Pilləkənləri tutaraq çıxır", normMonth: 22 }, { text: "Topu yuxarı atır və tutmağa cəhd edir", normMonth: 30 },
                { text: "Geri geri yeriyə bilir", normMonth: 26 }, { text: "Təpiklə topu vura bilir", normMonth: 34 },
                { text: "İki ayaqla yerindən uzağa tullanar", normMonth: 38 }, { text: "Bir ayaq üstə 5 saniyə dayanır", normMonth: 42 },
                { text: "Velosipeddə (üçtəkərli) pedal çevirə bilir", normMonth: 36 }
            ] }
    };
    const domainOrder = ["personalSocial", "fineMotor", "language", "grossMotor"];

    function renderTest() {
        const container = document.getElementById("domainsStack");
        container.innerHTML = "";
        for (let key of domainOrder) {
            const dom = domainsData[key];
            const card = document.createElement("div");
            card.className = "domain-card";
            card.innerHTML = `<div class="domain-title"><h2>${dom.title}</h2><div class="domain-desc">${dom.desc}</div></div><div class="questions-grid" id="grid-${key}"></div>`;
            container.appendChild(card);
            const grid = card.querySelector(`.questions-grid`);
            dom.items.forEach((item, idx) => {
                const itemId = `${key}_${idx}`;
                const normShow = (item.normMonth % 1 === 0) ? item.normMonth + " ay" : item.normMonth.toFixed(1) + " ay";
                const div = document.createElement("div");
                div.className = "test-item";
                div.innerHTML = `<div class="item-text">${item.text}</div><div class="item-norm">📌 normativ: ${normShow}</div>
                    <div class="item-options"><label><input type="radio" name="${itemId}" value="yes"> ✅ bacarır</label>
                    <label><input type="radio" name="${itemId}" value="no"> ❌ bacarmır</label>
                    <label><input type="radio" name="${itemId}" value="na"> 👁️ müşahidə yox</label></div>`;
                grid.appendChild(div);
            });
        }
    }

    function getAllItemResponses() {
        let responses = [];
        for (let key of domainOrder) {
            const items = domainsData[key].items;
            for (let i = 0; i < items.length; i++) {
                const radioName = `${key}_${i}`;
                const selected = document.querySelector(`input[name="${radioName}"]:checked`);
                const val = selected ? selected.value : null;
                responses.push({ domain: key, index: i, value: val });
            }
        }
        return responses;
    }

    function computeDetailedAnalysisFromResponses(responses, childAge) {
        let domainStats = {};
        for (let k of domainOrder) domainStats[k] = { delays: 0, warnings: 0, totalAssessed: 0, passed: 0, itemsDetail: [] };
        let passedNormValues = [];
        for (let r of responses) {
            if (!r.value || r.value === "na") continue;
            const isPass = (r.value === "yes");
            const itemData = domainsData[r.domain].items[r.index];
            const norm = itemData.normMonth;
            const age = childAge;
            domainStats[r.domain].totalAssessed++;
            if (isPass) { domainStats[r.domain].passed++; passedNormValues.push(norm); }
            let status = "normal";
            if (!isPass && age > norm) { status = "gecikme"; domainStats[r.domain].delays++; }
            else if (!isPass && age >= norm * 0.8 && age <= norm) { status = "xəbərdarlıq"; domainStats[r.domain].warnings++; }
            domainStats[r.domain].itemsDetail.push({
                text: itemData.text,
                normMonth: norm,
                childAge: age,
                isPass: isPass,
                status: status,
                answerValue: r.value
            });
        }
        let totalDelays = 0, totalWarnings = 0;
        for (let k of domainOrder) { totalDelays += domainStats[k].delays; totalWarnings += domainStats[k].warnings; }
        let avgDevAge = 0;
        if (passedNormValues.length > 0) avgDevAge = passedNormValues.reduce((a,b)=>a+b,0)/passedNormValues.length;
        let clinicalInterpret = "";
        if (totalDelays >= 3) clinicalInterpret = "Ciddi inkişaf geriliyi riski. Erkən müdaxilə təcili tövsiyə olunur.";
        else if (totalDelays >= 1) clinicalInterpret = "Yüngül/orta dərəcəli gecikmə aşkarlandı. Dəstək proqramlarına müraciət edin.";
        else if (totalWarnings >= 2) clinicalInterpret = "Sərhəd zonası (diqqət). 3-6 ay sonra test təkrarlanmalıdır.";
        else clinicalInterpret = "İnkişaf yaşa əsasən normada. Müntəzəm monitorinq kifayətdir.";
        return { domainStats, totalDelays, avgDevAge, clinicalInterpret };
    }

    let currentFullAnalysis = null;

    async function displayResultsAndAutoSave() {
        const ageInput = document.getElementById("childAge").value;
        let childAge = ageInput ? parseFloat(ageInput) : null;
        if (childAge === null || isNaN(childAge) || childAge < 0) {
            await customAlert("Zəhmət olmasa uşağın yaşını aylarla daxil edin (0-78).");
            return;
        }
        const responses = getAllItemResponses();
        const analysis = computeDetailedAnalysisFromResponses(responses, childAge);
        currentFullAnalysis = { ...analysis, childAge, responses };
        const { domainStats, avgDevAge, clinicalInterpret, totalDelays } = analysis;
        const childName = document.getElementById("childName").value.trim() || "Qeyd edilməyib";
        const testDate = document.getElementById("testDate").value || "tarix yoxdur";
        const expertName = document.getElementById("expertName").value.trim() || "göstərilməyib";

        let briefHtml = `<div style="display:flex; flex-wrap:wrap; gap:1rem; margin-bottom:1.2rem;">`;
        for (let key of domainOrder) {
            const d = domainStats[key];
            const percent = d.totalAssessed ? Math.round((d.passed/d.totalAssessed)*100) : 0;
            briefHtml += `<div style="flex:1; background:white; border-radius:24px; padding:0.8rem; text-align:center;">
                <b>${domainsData[key].title}</b><br>✅ ${d.passed}/${d.totalAssessed}<br>📊 ${percent}%<br>
                ${d.delays>0 ? `<span style="color:#c7362b;">⛔ ${d.delays} gecikmə</span><br>` : ""}
                ${d.warnings>0 ? `<span style="color:#e67e22;">⚠️ ${d.warnings} xəbərdarlıq</span>` : ""}
            </div>`;
        }
        briefHtml += `</div><div style="background:#fef4e8; border-radius:28px; padding:1rem;">
            <strong>🧠 Peşəkar rəy:</strong> ${clinicalInterpret}<br>
            <strong>📊 Təxmini inkişaf səviyyəsi:</strong> ${avgDevAge.toFixed(1)} ay<br>
            <strong>👶 Uşaq:</strong> ${childName} | Yaş: ${childAge} ay | Test: ${testDate}<br>
            <strong>👩‍⚕️ Mütəxəssis:</strong> ${expertName}<br>
            <strong>🔔 Toplam gecikmə:</strong> ${totalDelays}
        </div>`;
        let detailHtml = `<h4>🔍 Maddə-maddə klinik status</h4>`;
        for (let key of domainOrder) {
            const items = domainStats[key].itemsDetail;
            if (!items.length) continue;
            detailHtml += `<div><b>${domainsData[key].title}</b><ul>`;
            for (let it of items) {
                let statusClass = "", statusText = "";
                if (it.status === "gecikme") { statusClass = "status-delay"; statusText = "🔴 Gecikmə"; }
                else if (it.status === "xəbərdarlıq") { statusClass = "status-warn"; statusText = "🟠 Xəbərdarlıq"; }
                else { statusText = "✅ Normal"; }
                detailHtml += `<li><span>${it.text} (norm: ${it.normMonth}) → </span><span class="${statusClass}">${statusText}</span></li>`;
            }
            detailHtml += `</ul></div>`;
        }
        document.getElementById("resultsBrief").innerHTML = briefHtml;
        document.getElementById("extraDetails").innerHTML = detailHtml;
        document.getElementById("resultsArea").style.display = "block";
        autoSaveCurrentTest();
    }

    function autoSaveCurrentTest() {
        if (!currentFullAnalysis) return;
        const { childAge, responses, domainStats, avgDevAge, clinicalInterpret, totalDelays } = currentFullAnalysis;
        const childName = document.getElementById("childName").value.trim();
        if (!childName) {
            customAlert("Testi yadda saxlamaq üçün uşağın adını yazın.");
            return;
        }
        const testDate = document.getElementById("testDate").value || new Date().toISOString().slice(0,10);
        const expertName = document.getElementById("expertName").value.trim() || "göstərilməyib";
        const domainsSummary = {};
        for (let key of domainOrder) {
            const d = domainStats[key];
            domainsSummary[key] = {
                title: domainsData[key].title,
                passed: d.passed,
                totalAssessed: d.totalAssessed,
                percent: d.totalAssessed ? Math.round((d.passed/d.totalAssessed)*100) : 0,
                delays: d.delays,
                warnings: d.warnings
            };
        }
        const testRecord = {
            id: Date.now(),
            childName,
            childAge: parseInt(childAge),
            testDate,
            expertName,
            avgDevAge: avgDevAge.toFixed(1),
            clinicalInterpret,
            totalDelays,
            domainsSummary,
            itemResponses: responses
        };
        let saved = JSON.parse(localStorage.getItem("denverSavedTestsFull") || "[]");
        saved.unshift(testRecord);
        localStorage.setItem("denverSavedTestsFull", JSON.stringify(saved));
        renderModalList();
    }

    function renderModalList() {
        const container = document.getElementById("modalTestsList");
        let saved = JSON.parse(localStorage.getItem("denverSavedTestsFull") || "[]");
        if (!saved.length) {
            container.innerHTML = `<p style="color:#6f9a8b; text-align:center;">Hələ heç bir test yadda saxlanılmayıb.</p>`;
            return;
        }
        let html = `<div style="display:flex; flex-direction:column; gap:0.7rem;">`;
        saved.forEach(test => {
            html += `
                <div class="test-item-modal" style="background:#f6fef9; border-radius:20px; padding:0.8rem 1rem; display:flex; justify-content:space-between; align-items:center;">
                    <div class="test-info-modal" data-id="${test.id}" style="cursor:pointer; flex:2;">
                        <strong>${escapeHtml(test.childName)}</strong> (${test.childAge} ay) - ${test.testDate}<br>
                        <span style="font-size:0.7rem;">${escapeHtml(test.expertName)} | İnkişaf: ${test.avgDevAge} ay</span>
                    </div>
                    <button class="btn-delete-modal" data-id="${test.id}" style="background:none; border:none; font-size:1.2rem; cursor:pointer; color:#c7362b;"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
        document.querySelectorAll('.btn-delete-modal').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                deleteSavedTest(id);
            });
        });
        document.querySelectorAll('.test-info-modal').forEach(el => {
            el.addEventListener('click', () => {
                const id = parseInt(el.getAttribute('data-id'));
                openDetailedReportInNewWindow(id);
            });
        });
    }

    function deleteSavedTest(id) {
        let saved = JSON.parse(localStorage.getItem("denverSavedTestsFull") || "[]");
        saved = saved.filter(t => t.id !== id);
        localStorage.setItem("denverSavedTestsFull", JSON.stringify(saved));
        renderModalList();
        if (saved.length === 0) document.getElementById("resultsArea").style.display = "none";
    }

    function openDetailedReportInNewWindow(testId) {
        let saved = JSON.parse(localStorage.getItem("denverSavedTestsFull") || "[]");
        const test = saved.find(t => t.id === testId);
        if (!test) return;
        const win = window.open();
        win.document.write(generateFullReportHTML(test));
        win.document.close();
    }

    function generateFullReportHTML(test) {
        const { childName, childAge, testDate, expertName, avgDevAge, clinicalInterpret, totalDelays, domainsSummary, itemResponses } = test;
        let detailedItemsHtml = "";
        for (let key of domainOrder) {
            const domainTitle = domainsData[key].title;
            const items = domainsData[key].items;
            detailedItemsHtml += `<div style="margin-bottom:1.5rem;"><h3 style="color:#165f4b;">${domainTitle}</h3><ul style="margin-left:1.2rem;">`;
            for (let i = 0; i < items.length; i++) {
                const resp = itemResponses.find(r => r.domain === key && r.index === i);
                const answer = resp ? resp.value : null;
                let answerText = "❓ Cavab yoxdur";
                if (answer === "yes") answerText = "✅ Bacarır";
                else if (answer === "no") answerText = "❌ Bacarmır";
                else if (answer === "na") answerText = "👁️ Müşahidə edilmədi";
                let statusText = "";
                if (answer === "yes") statusText = "(Normal)";
                else if (answer === "no") {
                    const norm = items[i].normMonth;
                    if (childAge > norm) statusText = "<strong style='color:#c7362b;'>🔴 Gecikmə</strong>";
                    else if (childAge >= norm*0.8 && childAge <= norm) statusText = "<span style='color:#e67e22;'>🟠 Xəbərdarlıq</span>";
                    else statusText = "(Normal, yaş həddindən kiçik)";
                } else statusText = "(Müşahidə olunmayıb)";
                detailedItemsHtml += `<li><strong>${escapeHtml(items[i].text)}</strong> (norm: ${items[i].normMonth} ay) → ${answerText} ${statusText}</li>`;
            }
            detailedItemsHtml += `</ul></div>`;
        }
        let domainsHtml = "";
        for (let key of domainOrder) {
            const d = domainsSummary[key];
            if(d) domainsHtml += `<div style="background:#f6fcf9; border-radius:20px; padding:0.6rem; text-align:center; border:1px solid #cee6dd;">
                <b>${d.title}</b><br>✅ ${d.passed}/${d.totalAssessed}<br>📊 ${d.percent}%<br>${d.delays>0?`⛔ ${d.delays} gecikmə`:""} ${d.warnings>0?`⚠️ ${d.warnings} xəbərdarlıq`:""}
            </div>`;
        }
        return `<!DOCTYPE html>
        <html><head><meta charset="UTF-8"><title>Denver test nəticəsi - ${escapeHtml(childName)}</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <style>
            body { font-family: 'Inter', sans-serif; padding: 2rem; max-width: 1100px; margin: auto; background: #f6fcf9; }
            .report-card { background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1); }
            h1 { color: #146454; }
            .summary { background: #fef4e8; border-radius: 1.5rem; padding: 1rem; margin: 1rem 0; }
            .grid-domains { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1.5rem 0; }
            button { background: #1b6e5a; color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 60px; font-weight: 600; cursor: pointer; margin: 1rem 0; }
            @media print { button { display: none; } body { padding: 0; } .report-card { box-shadow: none; } }
        </style></head>
        <body><div class="report-card">
        <h1>📄 Denver II test nəticəsi</h1>
        <p><strong>Uşaq:</strong> ${escapeHtml(childName)} &nbsp;| <strong>Yaş:</strong> ${childAge} ay &nbsp;| <strong>Tarix:</strong> ${testDate}<br>
        <strong>Mütəxəssis:</strong> ${escapeHtml(expertName)} &nbsp;| <strong>İnkişaf yaşı (orta):</strong> ${avgDevAge} ay</p>
        <div class="summary"><strong>🧠 Psixoloji rəy:</strong> ${escapeHtml(clinicalInterpret)}<br><strong>🔔 Toplam gecikmə sayı:</strong> ${totalDelays}</div>
        <h3>Sahəvi nəticələr</h3><div class="grid-domains">${domainsHtml}</div>
        <h3>🔍 Bütün suallar və cavablar</h3>${detailedItemsHtml}
        <button onclick="window.print()">🖨️ Çap et / PDF kimi saxla</button>
        <p style="margin-top:2rem; font-size:0.7rem;">Bu sənəd Denver testi əsasında yaradılmışdır, diaqnozu əvəz etmir.</p>
        </div></body></html>`;
    }

    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function resetAllAnswers() {
        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        document.getElementById("resultsArea").style.display = "none";
        currentFullAnalysis = null;
    }
    async function generateParentReport() {
        if (!currentFullAnalysis) {
            await customAlert("Əvvəlcə 'Psixoloji analiz et' düyməsini basın.");
            return;
        }
        const { childAge, domainStats, avgDevAge, clinicalInterpret } = currentFullAnalysis;
        const childName = document.getElementById("childName").value.trim() || "Adsız";
        const testDate = document.getElementById("testDate").value || new Date().toISOString().slice(0,10);
        const expertName = document.getElementById("expertName").value.trim() || "göstərilməyib";
        let reportHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Denver Çıxarış - ${childName}</title>
        <style>body{font-family:'Inter',sans-serif;padding:2rem;max-width:1000px;margin:auto;background:#f6fcf9;}.report{border:2px solid #cee6dd;border-radius:36px;padding:2rem;background:white;}h1{color:#146454;}</style></head>
        <body><div class="report"><h1>📄 Denver İnkişaf Testi - Valideyn Arayışı</h1>
        <p><strong>Uşaq:</strong> ${childName} &nbsp;| <strong>Yaş:</strong> ${childAge} ay &nbsp;| <strong>Tarix:</strong> ${testDate} &nbsp;| <strong>Mütəxəssis:</strong> ${expertName}</p>
        <p><strong>Xülasə:</strong> ${clinicalInterpret}</p>
        <p><strong>📊 Təxmini inkişaf səviyyəsi:</strong> ${avgDevAge.toFixed(1)} ay</p><h3>Sahəvi nəticələr</h3><ul>`;
        for (let key of domainOrder) {
            const d = domainStats[key];
            const percent = d.totalAssessed ? Math.round((d.passed/d.totalAssessed)*100) : 0;
            reportHtml += `<li><strong>${domainsData[key].title}:</strong> ${d.passed}/${d.totalAssessed} (${percent}%) – Gecikmə: ${d.delays}, Xəbərdarlıq: ${d.warnings}</li>`;
        }
        reportHtml += `</ul><div style="background:#fef6e8; border-radius:24px; padding:1rem;"><strong>⚠️ Qeyd:</strong> Məlumat xarakterlidir.</div></div></body></html>`;
        const blob = new Blob([reportHtml], {type: "text/html"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Denver_${childName.replace(/\s/g, "_")}_ariyash.html`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    // Modal keçirilmiş testlər idarəsi
    const archiveModal = document.getElementById("archiveModal");
    const openArchiveBtn = document.getElementById("openArchiveBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const closeModalFooterBtn = document.getElementById("closeModalFooterBtn");
    function openModal() { renderModalList(); archiveModal.style.display = "flex"; }
    function closeModal() { archiveModal.style.display = "none"; }
    openArchiveBtn.onclick = openModal;
    closeModalBtn.onclick = closeModal;
    closeModalFooterBtn.onclick = closeModal;
    window.onclick = (e) => { if (e.target === archiveModal) closeModal(); };

    document.getElementById("testDate").value = new Date().toISOString().slice(0,10);
    renderTest();
    renderModalList();
    document.getElementById("analyzeBtn").addEventListener("click", displayResultsAndAutoSave);
    document.getElementById("resetBtn").addEventListener("click", resetAllAnswers);
    document.getElementById("reportBtn").addEventListener("click", generateParentReport);
</script>
</body>
</html>
