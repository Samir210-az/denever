<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Denver II Peşəkar Test – Keçirilmiş testlər panelli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e8f0ec 0%, #dbe9e2 100%);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 1.5rem;
            color: #1a3a2f;
            min-height: 100vh;
        }
        /* yan panel üçün düzən */
        .main-layout {
            display: flex;
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
        }
        /* əsas məzmun */
        .content {
            flex: 1;
            min-width: 0;
            background: rgba(255,255,255,0.97);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        /* yan panel (sidebar) */
        .sidebar {
            width: 320px;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.2s;
            border: 1px solid #cee6dd;
        }
        .sidebar-header {
            background: #eef9f4;
            padding: 1.2rem;
            border-bottom: 2px solid #cce8df;
            font-weight: 700;
            font-size: 1.2rem;
            color: #165f4b;
        }
        .tests-list-panel {
            flex: 1;
            max-height: 75vh;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .saved-test-card {
            background: #f6fef9;
            border-radius: 20px;
            padding: 0.8rem;
            border: 1px solid #e0efe8;
            cursor: pointer;
            transition: 0.1s;
        }
        .saved-test-card:hover {
            background: #edf8f3;
            border-color: #bdd9cf;
        }
        .test-name {
            font-weight: 700;
            color: #1a6e5a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .test-meta {
            font-size: 0.7rem;
            color: #5d8b7a;
        }
        .delete-test-btn {
            background: none;
            border: none;
            color: #c7362b;
            cursor: pointer;
            font-size: 1rem;
            padding: 0 0.3rem;
            border-radius: 30px;
        }
        .delete-test-btn:hover {
            background: #fee9e7;
        }
        .empty-msg {
            text-align: center;
            color: #6f9a8b;
            padding: 1rem;
            font-size: 0.85rem;
        }
        /* qalan hissələr əvvəlki kimi */
        .header {
            background: linear-gradient(135deg, #0e5c49, #1d8f72);
            padding: 1.8rem 2rem 1.5rem;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .header::after { content: "🧸"; position: absolute; bottom: -20px; right: 20px; font-size: 100px; opacity: 0.08; }
        .header h1 { font-size: 1.8rem; display: flex; flex-wrap: wrap; gap: 10px; align-items: baseline; }
        .badge { background: rgba(255,255,210,0.2); padding: 0.25rem 1rem; border-radius: 60px; font-size: 0.7rem; }
        .info-panel {
            background: #f6fef9;
            margin: 1rem 2rem 0.5rem 2rem;
            padding: 1rem 1.8rem;
            border-radius: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid #cee6dd;
        }
        .info-field { flex: 1; min-width: 140px; }
        .info-field label { font-size: 0.7rem; font-weight: 700; color: #1a6e5a; text-transform: uppercase; }
        .info-field input { width: 100%; padding: 0.6rem 1rem; border-radius: 40px; border: 1.5px solid #dcf0e9; background: white; font-family: inherit; }
        .domain-card {
            margin: 1.5rem 2rem;
            border-radius: 28px;
            background: white;
            border: 1px solid #e2f0ea;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .domain-card:hover { box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15); transform: translateY(-2px); }
        .domain-title { background: #f2fbf7; padding: 1rem 1.8rem; border-bottom: 2px solid #cce8df; border-radius: 28px 28px 24px 24px; }
        .domain-title h2 { font-size: 1.4rem; color: #165f4b; display: flex; align-items: center; gap: 8px; }
        .questions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1rem; padding: 1.4rem; }
        .test-item { background: white; border: 1px solid #e3f0ea; border-radius: 24px; padding: 0.9rem; }
        .item-text { font-weight: 700; font-size: 0.85rem; margin-bottom: 6px; }
        .item-norm { background: #eef6f2; display: inline-block; padding: 0.2rem 0.8rem; border-radius: 50px; font-size: 0.65rem; font-weight: 600; color: #146454; margin-bottom: 12px; }
        .item-options { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .item-options label { display: inline-flex; align-items: center; gap: 5px; background: #fefefe; border: 1px solid #d7eae2; padding: 0.3rem 0.9rem; border-radius: 50px; font-size: 0.75rem; cursor: pointer; }
        .item-options input { accent-color: #1e7a63; }
        .action-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 0.5rem 2rem 1rem 2rem; }
        .btn { border: none; padding: 0.75rem 1.8rem; border-radius: 60px; font-weight: 700; font-size: 0.85rem; cursor: pointer; background: white; transition: 0.2s; }
        .btn-primary { background: linear-gradient(105deg, #1c765f, #1b8b6f); color: white; box-shadow: 0 6px 14px -6px rgba(27,117,90,0.4); }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary { background: #ecf3f0; border: 1px solid #c8dfd6; }
        .btn-report { background: #fdf3e0; border: 1px solid #f0dbbe; color: #956e3c; }
        .results-panel { background: #f8fffc; margin: 0 2rem 1rem 2rem; border-radius: 32px; padding: 1.5rem; border-top: 5px solid #289672; display: none; animation: fadeSlideUp 0.3s; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .detail-summary { background: white; border-radius: 24px; padding: 1.2rem; max-height: 380px; overflow-y: auto; font-size: 0.8rem; margin-top: 1rem; }
        .status-delay { color: #d63918; font-weight: 700; }
        .status-warn { color: #e67e22; font-weight: 700; }
        footer { text-align: center; padding: 1rem; font-size: 0.7rem; color: #6f9a8b; border-top: 1px solid #deede7; background: white; }
        .social-link { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045); color: white; text-decoration: none; padding: 0.3rem 1rem; border-radius: 60px; font-weight: 600; font-size: 0.8rem; }
        @media (max-width: 900px) { .main-layout { flex-direction: column; } .sidebar { width: 100%; order: 2; margin-top: 1rem; } .content { order: 1; } }
    </style>
</head>
<body>
<div class="main-layout">
    <!-- SOL YAN PANEL: Keçirilmiş testlər -->
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-history"></i> Keçirilmiş testlər
        </div>
        <div id="savedTestsPanel" class="tests-list-panel">
            <div class="empty-msg">Yüklənir...</div>
        </div>
    </div>

    <!-- ƏSAS MƏZMUN (tamamilə orijinal quruluş) -->
    <div class="content">
        <div class="header">
            <h1>Denver II İnkişaf Testi <span class="badge">📋 Peşəkar versiya</span></h1>
            <div class="subhead" style="font-size:0.85rem; margin-top:0.3rem;"> • Xüsusi qayğıya ehtiyacı olan uşaqlar üçün • </div>
        </div>

        <div class="info-panel">
            <div class="info-field"><label>👶 Uşağın adı / kodu</label><input type="text" id="childName" placeholder="Məs. Həsən"></div>
            <div class="info-field"><label>📅 Yaş (ayla)</label><input type="number" id="childAge" placeholder="28" min="0" max="78"></div>
            <div class="info-field"><label>📆 Test tarixi</label><input type="date" id="testDate"></div>
            <div class="info-field"><label>👩‍⚕️ Mütəxəssis adı</label><input type="text" id="expertName" placeholder="Psixoloq / Həkim"></div>
        </div>

        <div id="domainsStack"></div>

        <div class="action-bar">
            <button class="btn btn-primary" id="analyzeBtn">📊 Tamamla </button>
            <button class="btn btn-secondary" id="resetBtn">⟳ Cavabları sıfırla</button>
            <button class="btn btn-report" id="reportBtn">📄 Valideyn çıxarışı (arayış)</button>
        </div>

        <div id="resultsArea" class="results-panel">
            <h3>📈 Nəticə və inkişaf profili</h3>
            <div id="resultsBrief"></div>
            <div id="extraDetails" class="detail-summary"></div>
        </div>

        <footer>
            <a href="https://www.instagram.com/s_akhundoff" target="_blank" class="social-link"><i class="fab fa-instagram"></i> by s_akhundoff</a>
            <div class="copyright" style="margin-top:8px;">Bütün hüquqları qorunur. 2026</div>
        </footer>
    </div>
</div>

<script>
    // ================= DOMAINLAR (tam orijinal, dəyişilməyib) =================
    const domainsData = {
        personalSocial: { title: "🧸 Şəxsi-Sosial", desc: "Özünəxidmət, emosiya, sosial qarşılıqlılıq",
            items: [
                { text: "Tanış səsə baş çevirir", normMonth: 2.5 }, { text: "Öz adına gülümsəmə ilə cavab verir", normMonth: 6 },
                { text: "Böyüklərin əl çalmasını təqlid edir", normMonth: 9 }, { text: "Sadə əmrləri başa düşür ('gəl', 'ver')", normMonth: 12 },
                { text: "Oyuncağı başqasına tərəf uzadır", normMonth: 14 }, { text: "Geyinmə zamanı qolunu qoltuğa keçirir", normMonth: 18 },
                { text: "Qaşıq tutub ağzına aparmağa cəhd edir", normMonth: 16 }, { text: "Öz duyğularını mimika/göstərir", normMonth: 24 },
                { text: "Əşyaları yerinə qoymağa kömək edir", normMonth: 28 }, { text: "Sadə sosial qaydaları tanıyır (növbə gözləmə)", normMonth: 36 },
                { text: "Öz əşyalarını başqalarınınkından ayırır", normMonth: 30 }, { text: "Əl-ələ oyun oynayır ('əl çal, əl çal')", normMonth: 22 },
                { text: "Dostlarına maraq göstərir (yanında oynama)", normMonth: 32 }, { text: "Təşəkkür, salam kimi sözləri işlədə bilir", normMonth: 34 },
                { text: "Gündəlik işlərdə müstəqillik (əllərini yuma)", normMonth: 42 }
            ] },
        fineMotor: { title: "✍️ İncə Motor", desc: "Əl-göz koordinasiyası, tutma, rəsm, tikinti",
            items: [
                { text: "Hərəkət edən üzü izləyir", normMonth: 2 }, { text: "Çınqıldağı əlində ən az 5 saniyə tutur", normMonth: 4 },
                { text: "Əşyanı bir əlindən digərinə keçirir", normMonth: 6 }, { text: "Kiçik əşyanı baş və şəhadət barmağı ilə tutur", normMonth: 10 },
                { text: "3-4 blokdan qüllə qurur", normMonth: 18 }, { text: "Qaralama xətlər çəkir", normMonth: 16 },
                { text: "Dairə şəkli çəkə bilir", normMonth: 28 }, { text: "Düymələri böyük düymələri aça bilir", normMonth: 30 },
                { text: "Qayçı ilə kağız kəsə bilir", normMonth: 36 }, { text: "4-6 hissəli puzzle yığa bilir", normMonth: 32 },
                { text: "İpə muncuq dizə bilir (böyük muncuqlar)", normMonth: 26 }, { text: "Kvadrat şəkli çəkir", normMonth: 40 },
                { text: "Əlində qələmi düzgün tutur", normMonth: 38 }, { text: "Üçbucaq çəkir", normMonth: 48 },
                { text: "Sadə labirint çəkə bilir (qələm izi)", normMonth: 44 }
            ] },
        language: { title: "🗣️ Dil & Ünsiyyət", desc: "Reseptiv, ekspressiv dil, söz ehtiyatı",
            items: [
                { text: "Səslər çıxarır (gurultu, ağulama)", normMonth: 2 }, { text: "Səsli gülüş və xoş səslər çıxarır", normMonth: 5 },
                { text: "Təkrar hecalar 'ba-ba', 'da-da'", normMonth: 8 }, { text: "Ən az 3 mənalı söz (ana, ata, su)", normMonth: 13 },
                { text: "Bədən hissələrini göstərir (burun, göz)", normMonth: 18 }, { text: "İstədiyi əşyanı adı ilə söyləyir", normMonth: 20 },
                { text: "2-3 sözlü sadə cümlə qurur", normMonth: 24 }, { text: "Sadə şəkilləri adlandıra bilir (top, pişik)", normMonth: 28 },
                { text: "Əvəzliklərdən istifadə edir (mən, sən)", normMonth: 30 }, { text: "Nə? kim? suallarını başa düşür", normMonth: 26 },
                { text: "Sadə hekayə şəklini izah edir", normMonth: 36 }, { text: "Rəngləri tanıyır (ən az 3 rəng)", normMonth: 34 },
                { text: "Əks mənaları başa düşür (böyük-kiçik)", normMonth: 38 }, { text: "Davamlı söhbət edə bilir (3-4 cümlə)", normMonth: 42 },
                { text: "Sadə tapmaca və sualları cavablandırır", normMonth: 40 }
            ] },
        grossMotor: { title: "🏃 Ümumi Motor", desc: "Tarazlıq, yerimə, qaçma, tullanma",
            items: [
                { text: "Başını qısa müddət dik tutur (üzüstü)", normMonth: 2 }, { text: "Arxadan yan üstə dönür", normMonth: 4.5 },
                { text: "Dəstəksiz oturur (10+ saniyə)", normMonth: 7 }, { text: "Qarın üstə sürünür", normMonth: 9 },
                { text: "Mebeldən tutaraq ayağa qalxır", normMonth: 11 }, { text: "Müstəqil yeriyir (4 addım)", normMonth: 14 },
                { text: "Yerindən tullanır (iki ayaqla)", normMonth: 28 }, { text: "Bir ayaq üstə 2 saniyə dayanır", normMonth: 32 },
                { text: "Pilləkənləri tutaraq çıxır", normMonth: 22 }, { text: "Topu yuxarı atır və tutmağa cəhd edir", normMonth: 30 },
                { text: "Geri geri yeriyə bilir", normMonth: 26 }, { text: "Təpiklə topu vura bilir", normMonth: 34 },
                { text: "İki ayaqla yerindən uzağa tullanar", normMonth: 38 }, { text: "Bir ayaq üstə 5 saniyə dayanır", normMonth: 42 },
                { text: "Velosipeddə (üçtəkərli) pedal çevirə bilir", normMonth: 36 }
            ] }
    };
    const domainOrder = ["personalSocial", "fineMotor", "language", "grossMotor"];

    // ========== RENDER TEST (DOMAINLƏR) ==========
    function renderTest() {
        const container = document.getElementById("domainsStack");
        container.innerHTML = "";
        for (let key of domainOrder) {
            const dom = domainsData[key];
            const card = document.createElement("div"); card.className = "domain-card";
            card.innerHTML = `<div class="domain-title"><h2>${dom.title}</h2><div class="domain-desc">${dom.desc}</div></div><div class="questions-grid" id="grid-${key}"></div>`;
            container.appendChild(card);
            const grid = card.querySelector(`.questions-grid`);
            dom.items.forEach((item, idx) => {
                const itemId = `${key}_${idx}`;
                const normShow = (item.normMonth % 1 === 0) ? item.normMonth + " ay" : item.normMonth.toFixed(1) + " ay";
                const div = document.createElement("div"); div.className = "test-item";
                div.innerHTML = `<div class="item-text">${item.text}</div><div class="item-norm">📌 normativ: ${normShow}</div>
                    <div class="item-options"><label><input type="radio" name="${itemId}" value="yes"> ✅ bacarır</label>
                    <label><input type="radio" name="${itemId}" value="no"> ❌ bacarmır</label>
                    <label><input type="radio" name="${itemId}" value="na"> 👁️ müşahidə yox</label></div>`;
                grid.appendChild(div);
            });
        }
    }

    // cari cavabları yığ
    function getAllResponses() {
        let responses = [];
        for (let key of domainOrder) {
            const items = domainsData[key].items;
            for (let i = 0; i < items.length; i++) {
                const selected = document.querySelector(`input[name="${key}_${i}"]:checked`);
                responses.push({ domain: key, index: i, value: selected ? selected.value : null });
            }
        }
        return responses;
    }

    // hesablama (domainStats, avgDevAge və s)
    function computeAnalysis(responses, childAge) {
        let domainStats = {};
        for (let k of domainOrder) domainStats[k] = { delays: 0, warnings: 0, totalAssessed: 0, passed: 0, itemsDetail: [] };
        let passedNormValues = [];
        for (let r of responses) {
            if (!r.value || r.value === "na") continue;
            const isPass = (r.value === "yes");
            const item = domainsData[r.domain].items[r.index];
            const norm = item.normMonth;
            domainStats[r.domain].totalAssessed++;
            if (isPass) { domainStats[r.domain].passed++; passedNormValues.push(norm); }
            let status = "normal";
            if (!isPass && childAge > norm) { status = "gecikme"; domainStats[r.domain].delays++; }
            else if (!isPass && childAge >= norm * 0.8 && childAge <= norm) { status = "xəbərdarlıq"; domainStats[r.domain].warnings++; }
            domainStats[r.domain].itemsDetail.push({ text: item.text, normMonth: norm, isPass, status });
        }
        let totalDelays = 0, totalWarnings = 0;
        for (let k of domainOrder) { totalDelays += domainStats[k].delays; totalWarnings += domainStats[k].warnings; }
        let avgDevAge = passedNormValues.length ? passedNormValues.reduce((a,b)=>a+b,0)/passedNormValues.length : 0;
        let clinicalInterpret = totalDelays>=3 ? "Ciddi inkişaf geriliyi riski." : (totalDelays>=1 ? "Yüngül/orta gecikmə." : (totalWarnings>=2 ? "Sərhəd zonası." : "İnkişaf yaşa uyğun."));
        return { domainStats, totalDelays, avgDevAge, clinicalInterpret };
    }

    let currentAnalysis = null;
    function displayAndAutoSave() {
        const ageRaw = document.getElementById("childAge").value;
        let childAge = ageRaw ? parseFloat(ageRaw) : null;
        if (!childAge || isNaN(childAge)) { alert("Yaş daxil edin"); return; }
        const responses = getAllResponses();
        const { domainStats, totalDelays, avgDevAge, clinicalInterpret } = computeAnalysis(responses, childAge);
        currentAnalysis = { domainStats, totalDelays, avgDevAge, clinicalInterpret, childAge, responses };
        const childName = document.getElementById("childName").value.trim() || "Adsız";
        const testDate = document.getElementById("testDate").value || new Date().toISOString().slice(0,10);
        const expertName = document.getElementById("expertName").value.trim() || "-";
        // nəticə HTML
        let brief = `<div style="display:flex; flex-wrap:wrap; gap:1rem;">`;
        for (let key of domainOrder) {
            const d = domainStats[key];
            let percent = d.totalAssessed ? Math.round((d.passed/d.totalAssessed)*100) : 0;
            brief += `<div style="flex:1; background:white; border-radius:24px; padding:0.6rem; text-align:center;"><b>${domainsData[key].title}</b><br>✅ ${d.passed}/${d.totalAssessed}<br>${percent}%<br>${d.delays>0?`⛔ ${d.delays} gecikmə`:""}</div>`;
        }
        brief += `</div><div style="background:#fef4e8; border-radius:24px; padding:1rem; margin-top:1rem;"><strong>Rəy:</strong> ${clinicalInterpret}<br><strong>İnkişaf yaşı təxmini:</strong> ${avgDevAge.toFixed(1)} ay<br><strong>Uşaq:</strong> ${childName} (${childAge} ay) | Mütəxəssis: ${expertName}</div>`;
        let detail = `<h4>🔍 Maddə statusu</h4>`;
        for (let key of domainOrder) {
            const items = domainStats[key].itemsDetail;
            if(!items.length) continue;
            detail += `<div><b>${domainsData[key].title}</b><ul>`;
            for(let it of items){
                let statusT = it.status==="gecikme" ? "<span class='status-delay'>🔴 Gecikmə</span>" : (it.status==="xəbərdarlıq" ? "<span class='status-warn'>🟠 Xəbərdarlıq</span>" : "✅ Normal");
                detail += `<li>${it.text} (norm:${it.normMonth}) → ${statusT}</li>`;
            }
            detail += `</ul></div>`;
        }
        document.getElementById("resultsBrief").innerHTML = brief;
        document.getElementById("extraDetails").innerHTML = detail;
        document.getElementById("resultsArea").style.display = "block";
        // Avtomatik yadda saxla
        saveTestToLocal(childName, childAge, testDate, expertName, responses, domainStats, avgDevAge, clinicalInterpret, totalDelays);
        renderSavedTestsPanel(); // paneldə yenilə
    }

    function saveTestToLocal(childName, childAge, testDate, expertName, responses, domainStats, avgDevAge, clinicalInterpret, totalDelays) {
        let saved = JSON.parse(localStorage.getItem("denverTestsFull") || "[]");
        const domainsSummary = {};
        for (let key of domainOrder) {
            const d = domainStats[key];
            domainsSummary[key] = { title: domainsData[key].title, passed: d.passed, totalAssessed: d.totalAssessed, percent: d.totalAssessed ? Math.round((d.passed/d.totalAssessed)*100) : 0, delays: d.delays, warnings: d.warnings };
        }
        const record = { id: Date.now(), childName, childAge, testDate, expertName, avgDevAge: avgDevAge.toFixed(1), clinicalInterpret, totalDelays, domainsSummary, responses: responses.map(r=>({domain:r.domain, index:r.index, value:r.value})) };
        saved.unshift(record);
        localStorage.setItem("denverTestsFull", JSON.stringify(saved));
    }

    function renderSavedTestsPanel() {
        const container = document.getElementById("savedTestsPanel");
        let saved = JSON.parse(localStorage.getItem("denverTestsFull") || "[]");
        if(!saved.length) { container.innerHTML = `<div class="empty-msg">Hələ test yoxdur.<br>Analiz edəndə avtomatik saxlanır.</div>`; return; }
        container.innerHTML = "";
        saved.forEach(test => {
            const card = document.createElement("div");
            card.className = "saved-test-card";
            card.innerHTML = `
                <div class="test-name">
                    <span style="cursor:pointer;" class="test-name-click" data-id="${test.id}">${escapeHtml(test.childName)}</span>
                    <button class="delete-test-btn" data-id="${test.id}" title="Sil"><i class="fas fa-trash-alt"></i></button>
                </div>
                <div class="test-meta">${test.childAge} ay | ${test.testDate}</div>
            `;
            container.appendChild(card);
            card.querySelector(".test-name-click").addEventListener("click", (e) => { e.stopPropagation(); openReportWindow(test.id); });
            card.querySelector(".delete-test-btn").addEventListener("click", (e) => { e.stopPropagation(); deleteTestById(test.id); });
        });
    }

    function deleteTestById(id) {
        let saved = JSON.parse(localStorage.getItem("denverTestsFull") || "[]");
        saved = saved.filter(t => t.id !== id);
        localStorage.setItem("denverTestsFull", JSON.stringify(saved));
        renderSavedTestsPanel();
        if(saved.length===0 && document.getElementById("resultsArea")) document.getElementById("resultsArea").style.display = "none";
    }

    function openReportWindow(testId) {
        let saved = JSON.parse(localStorage.getItem("denverTestsFull") || "[]");
        const test = saved.find(t => t.id === testId);
        if (!test) return;
        const win = window.open();
        win.document.write(generateFullReport(test));
        win.document.close();
    }

    function generateFullReport(t) {
        let itemsHtml = "";
        for (let key of domainOrder) {
            const domainTitle = domainsData[key].title;
            const itemsList = domainsData[key].items;
            itemsHtml += `<div style="margin-bottom:1.2rem;"><h3>${domainTitle}</h3><ul>`;
            for (let i=0; i<itemsList.length; i++) {
                const resp = t.responses.find(r => r.domain === key && r.index === i);
                let ans = "❓ Cavab yox";
                if(resp?.value === "yes") ans = "✅ Bacarır";
                else if(resp?.value === "no") ans = "❌ Bacarmır";
                else if(resp?.value === "na") ans = "👁️ Müşahidə yox";
                const norm = itemsList[i].normMonth;
                let statusHtml = "";
                if(resp?.value === "no" && t.childAge > norm) statusHtml = " <strong style='color:#c7362b;'>(Gecikmə)</strong>";
                else if(resp?.value === "no" && t.childAge >= norm*0.8 && t.childAge <= norm) statusHtml = " <span style='color:#e67e22;'>(Xəbərdarlıq)</span>";
                itemsHtml += `<li><strong>${escapeHtml(itemsList[i].text)}</strong> (norm:${norm} ay) → ${ans} ${statusHtml}</li>`;
            }
            itemsHtml += `</ul></div>`;
        }
        let domainsHtml = "";
        for (let key of domainOrder) {
            const d = t.domainsSummary[key];
            if(d) domainsHtml += `<div style="background:#f6fcf9; border-radius:16px; padding:0.5rem; text-align:center;"><b>${d.title}</b><br>✅ ${d.passed}/${d.totalAssessed}<br>${d.delays>0?`⛔ ${d.delays} gecikmə`:""}</div>`;
        }
        return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHtml(t.childName)} - Denver nəticə</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <style>body{font-family:'Inter',sans-serif;padding:2rem;max-width:1000px;margin:auto;background:#f6fcf9;} .card{background:white;border-radius:32px;padding:2rem;}</style></head>
        <body><div class="card"><h1>📋 Denver Test Nəticəsi</h1><p><strong>Uşaq:</strong> ${escapeHtml(t.childName)} (${t.childAge} ay) <br> <strong>Tarix:</strong> ${t.testDate} | <strong>Mütəxəssis:</strong> ${escapeHtml(t.expertName)}</p>
        <p><strong>Klinik rəy:</strong> ${t.clinicalInterpret}<br><strong>İnkişaf yaşı (orta):</strong> ${t.avgDevAge} ay</p>
        <div style="display:flex; flex-wrap:wrap; gap:1rem; margin:1rem 0;">${domainsHtml}</div>
        <h3>🔍 Ətraflı suallar</h3>${itemsHtml}<button onclick="window.print()" style="margin-top:1rem; background:#1b6e5a; color:white; border:none; padding:0.5rem 1rem; border-radius:40px;">🖨️ Çap et</button>
        <p style="margin-top:2rem; font-size:0.7rem;">Bu sənəd Denver testinə əsaslanır, diaqnozu əvəz etmir.</p></div></body></html>`;
    }

    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    function resetAll() { document.querySelectorAll('input[type="radio"]').forEach(r=>r.checked=false); document.getElementById("resultsArea").style.display="none"; currentAnalysis=null; }
    function parentReport() {
        if(!currentAnalysis) { alert("Əvvəlcə analiz edin"); return; }
        const a = currentAnalysis;
        const childName = document.getElementById("childName").value.trim() || "Adsız";
        const testDate = document.getElementById("testDate").value || "";
        const expert = document.getElementById("expertName").value.trim() || "";
        let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Valideyn arayışı</title><style>body{font-family:'Inter',sans-serif;padding:2rem;}</style></head><body><div style="background:white; border-radius:32px; padding:2rem;"><h1>Denver Çıxarış</h1><p><strong>Uşaq:</strong> ${childName} (${a.childAge} ay) <br> <strong>Tarix:</strong> ${testDate} | Mütəxəssis: ${expert}</p><p>${a.clinicalInterpret}<br>İnkişaf yaşı: ${a.avgDevAge.toFixed(1)} ay</p><p style="margin-top:2rem;">Bu arayış məlumat xarakterlidir.</p></div></body></html>`;
        const blob = new Blob([html], {type:"text/html"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Denver_${childName.replace(/\s/g, "_")}_arayish.html`;
        link.click(); URL.revokeObjectURL(link.href);
    }

    document.getElementById("testDate").value = new Date().toISOString().slice(0,10);
    renderTest();
    renderSavedTestsPanel();
    document.getElementById("analyzeBtn").addEventListener("click", displayAndAutoSave);
    document.getElementById("resetBtn").addEventListener("click", resetAll);
    document.getElementById("reportBtn").addEventListener("click", parentReport);
</script>
</body>
</html>
